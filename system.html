<!DOCTYPE html>
<html>
<head>
<title>SYSTEM</title>

<style>
body{
  margin:0;
  background:#A9E2EB;
  color:#0A0214;
  font-family:monospace;
}

/* 三栏布局 */
.container{
  display:flex;
  height:100vh;
  width:100%;
  overflow:hidden;
}

.left, .middle, .right{
  min-width:0;
}

/* 左边（数据） */
.left{
  width:25%;
  padding:20px;
  border-right:2px solid #0A0214;
  overflow-y:auto;
  overflow-x:hidden;
  font-family: "Noto Serif SC", serif;
  font-size:16px;
  overflow-y:auto;
  max-height:100vh;
}

/* 中间（终端） */
.middle{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 右边（文件） */
.right{
  width:25%;
  padding:20px;
  border-left:2px solid #0A0214;
}

/* 终端 */
#terminal{
  background:black;
  color:#00ffcc;
  padding:20px;
  width:90%;
  height:80%;
  overflow-y:auto;
  border:1px solid #00ffcc;
}

#cmd{
  width:100%;
  background:black;
  color:#00ffcc;
  border:none;
  outline:none;
  margin-top:10px;
}

/* 文件样式 */
a{
  display:block;
  margin:10px 0;
  color:#141404;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

h1{
  font-size:40px;
}
  /* 整个评论框 */
.review{
  display:flex;
  align-items:flex-start;
  border:1px solid #0A0214;
  padding:10px;
  margin-bottom:15px;
  background:#ffffff55; /* 半透明 */
  max-width:100%;
  width:100%;
  word-break:break-word;
  box-sizing:border-box;
}

/* 头像 */
.avatar{
  width:40px;
  height:40px;
  margin-right:10px;
  flex-shrink:0;
}

/* 用户名 */
.username{
  font-weight:bold;
}

/* 时间 */
.time{
  font-size:12px;
  color:#555;
  margin-top:5px;
}

/* 评论内容 */
.content{
  margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

  <!-- 🌸 左：花店数据 -->
<div class="left">

  <h1>有间花店</h1>

  <p>成交额: 2,450</p>
  <p>退款额: 570</p>
  <p>评分: ★★★★☆</p>
  <p>Reviews: 128</p>
  <p>Status: Stable</p>

  <h3>REVIEWS</h3>

  <!-- 评论1 -->
  <div class="review">
    <img src="avatar2.png" class="avatar">

    <div class="review-text">
      <div class="username">flower_girl</div>
      <div class="time">2026-04-23 09:12</div>
      <div class="content">包装很精致，很喜欢 🌸</div>
    </div>
  </div>

  <!-- 评论2 -->
  <div class="review">
    <img src="avatar3.png" class="avatar">

    <div class="review-text">
      <div class="username">client88</div>
      <div class="time">2026-04-22 18:45</div>
      <div class="content">第二次回购了，服务很好。</div>
    </div>
  </div>

</div>
 
  <!-- 💻 中：终端 -->
  <div class="middle">
    <div id="terminal">
      <div id="output">
        <p>> booting flower_sys...</p>
        <p>> loading data...</p>
        <p>> welcome back, owner</p>
      </div>
      <input id="cmd" placeholder="type command..." onkeydown="run(event)">
    </div>
  </div>

  <!-- 📁 右：文件 -->
  <div class="right">
    <h3>FILES</h3>
    <a href="file1.html">customer_data.txt</a>
    <a href="file2.html">flower_log.txt</a>
    <a href="secret.html">???</a>
  </div>

</div>

<script>
function run(e){
  if(e.key === "Enter"){
    let input = document.getElementById("cmd").value;
    let output = document.getElementById("output");

    output.innerHTML += "<p>> " + input + "</p>";

    if(input === "help"){
      output.innerHTML += "<p>commands: help, status, open log, clear</p>";
    }

    else if(input === "status"){
      output.innerHTML += "<p>system stable</p>";
    }

    else if(input === "open log"){
      output.innerHTML += "<p>opening flower_log.txt...</p>";
      setTimeout(()=>{
        window.location.href = "file2.html";
      },1000);
    }

    else if(input === "open customer"){
      output.innerHTML += "<p>opening customer_data.txt...</p>";
      setTimeout(()=>{
        window.location.href = "file1.html";
      },1000);
    }

    else if(input === "unlock"){
      output.innerHTML += "<p>hidden file unlocked...</p>";
      setTimeout(()=>{
        window.location.href = "secret.html";
      },1000);
    }

    else if(input === "clear"){
      output.innerHTML = "";
    }

    else{
      output.innerHTML += "<p>unknown command</p>";
    }

    document.getElementById("cmd").value = "";
    output.scrollTop = output.scrollHeight;
  }
}
</script>

</body>
</html>
